<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function toggleMusic() {
    const audio = document.getElementById('bgm');
    const btn = document.getElementById('jpBtn');

    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸ 一時停止/暂停";
    } else {
        audio.pause();
        btn.innerText = "▶ 再生/播放";
    }
}
</script>
